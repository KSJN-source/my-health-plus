<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Health+"/>
  <meta name="theme-color" content="#D97757"/>
  <title>My Health Plus</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;width:100%;background:#FFF8F5;overscroll-behavior:none}
    body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    #splash{position:fixed;inset:0;z-index:9999;background:#D97757;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s ease}
    #splash.hidden{opacity:0;pointer-events:none}
    #splash-logo{font-family:Georgia,serif;font-size:44px;font-weight:bold;color:#1A2744;letter-spacing:-1px}
    #splash-sub{font-family:-apple-system,sans-serif;font-size:15px;font-weight:500;color:rgba(255,255,255,.85)}
    #splash-bar{width:48px;height:4px;background:rgba(255,255,255,.3);border-radius:2px;overflow:hidden}
    #splash-bar::after{content:'';display:block;width:50%;height:100%;background:white;border-radius:2px;animation:slide 1s ease-in-out infinite alternate}
    @keyframes slide{from{transform:translateX(0)}to{transform:translateX(100%)}}
    #install-banner{display:none;position:fixed;bottom:80px;left:16px;right:16px;z-index:200;background:#1A2138;color:white;border-radius:14px;padding:14px 16px;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
    #install-banner.show{display:flex}
    #install-banner p{flex:1;font-size:13px;line-height:1.4}
    #ios-tip{display:none;position:fixed;bottom:80px;left:16px;right:16px;z-index:200;background:#1A2138;color:white;border-radius:14px;padding:14px 16px;font-size:13px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.3)}
    #ios-tip.show{display:block}
    #ios-tip strong{color:#D97757}
    ::-webkit-scrollbar{display:none}
  </style>
</head>
<body>
<div id="splash">
  <div id="splash-logo">my Health+</div>
  <div id="splash-sub">Loading…</div>
  <div id="splash-bar"></div>
</div>
<div id="root"></div>
<div id="ios-tip">
  To install: tap <strong>Share ↑</strong> then <strong>Add to Home Screen</strong><br/>
  <button onclick="this.closest('#ios-tip').classList.remove('show');localStorage.setItem('ios-tip-shown','1')" style="margin-top:8px;background:#D97757;color:white;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600">Got it</button>
</div>
<div id="install-banner">
  <p>Install <strong>My Health Plus</strong> for the best experience.</p>
  <button id="install-btn" style="background:#D97757;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">Install</button>
  <button onclick="document.getElementById('install-banner').classList.remove('show');localStorage.setItem('install-dismissed','1')" style="background:transparent;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:4px">✕</button>
</div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script>
(function(){
  function showError(msg){
    document.getElementById('splash').innerHTML='<p style="color:white;padding:30px;text-align:center;font-size:14px;line-height:1.8">⚠️ Failed to load app<br/><br/>'+msg+'</p>';
  }
  function loadScript(src,cb){
    var s=document.createElement('script');
    s.src=src;s.onload=cb;
    s.onerror=function(){showError('Could not load: '+src);};
    document.head.appendChild(s);
  }
  function runApp(){
    fetch('./app.jsx?cb='+Date.now())
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status+' loading app.jsx');return r.text();})
      .then(function(jsx){
        try{
          var code=Babel.transform(jsx,{presets:['react']}).code;
          // indirect eval runs in global scope
          (0, eval)(code);
        }catch(e){showError('Compile error: '+e.message);}
      })
      .catch(function(e){showError(''+e.message);});
  }
  loadScript('https://unpkg.com/@babel/standalone/babel.min.js',runApp);
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js');});
}
var _dp=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();_dp=e;
  if(!localStorage.getItem('install-dismissed'))
    setTimeout(function(){document.getElementById('install-banner').classList.add('show');},3000);
});
document.getElementById('install-btn').addEventListener('click',function(){
  document.getElementById('install-banner').classList.remove('show');
  if(_dp){_dp.prompt();_dp.userChoice.then(function(r){_dp=null;if(r.outcome==='accepted')localStorage.setItem('install-dismissed','1');});}
});
var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
var isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
if(isIOS&&!isStandalone&&!localStorage.getItem('ios-tip-shown'))
  setTimeout(function(){document.getElementById('ios-tip').classList.add('show');},4000);
</script>
</body>
</html>
